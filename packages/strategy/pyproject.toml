[project]
name = "strategy"
version = "0.1.0"
description = "The Business Strategy Engine — turns research and evidence into cited, structured business decisions."
requires-python = ">=3.12"
dependencies = [
    "core",
    "knowledge",
    "research",
    "sqlalchemy[asyncio]>=2.0.30",
]

[tool.uv.sources]
core = { workspace = true }
knowledge = { workspace = true }
research = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/strategy"]
