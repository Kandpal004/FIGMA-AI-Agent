[project]
name = "design-system"
version = "0.1.0"
description = "The Design System Engine — transforms design language and component intelligence into a production-ready, provenance-tracked design system (tokens, components, themes, constraints, platform mappings) for Shopify Plus, Adobe Commerce, and beyond."
requires-python = ">=3.12"
dependencies = [
    "core",
    "knowledge",
    "strategy",
    "brand",
    "psychology",
    "ux",
    "ia",
    "wireframe",
    "creative-director",
    "design-language",
    "component-intelligence",
    "sqlalchemy[asyncio]>=2.0.30",
]

[tool.uv.sources]
core = { workspace = true }
knowledge = { workspace = true }
strategy = { workspace = true }
brand = { workspace = true }
psychology = { workspace = true }
ux = { workspace = true }
ia = { workspace = true }
wireframe = { workspace = true }
creative-director = { workspace = true }
design-language = { workspace = true }
component-intelligence = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/design_system"]
