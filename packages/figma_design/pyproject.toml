[project]
name = "figma-design"
version = "0.1.0"
description = "The Figma Design Engine — transforms the design execution plan into an internal, platform-independent Figma Design Model (pages, frames, auto-layout, components, variants, variables, styles) capable of producing enterprise-grade Figma files. No Figma SDK, MCP, or HTTP in the domain."
requires-python = ">=3.12"
dependencies = [
    "core",
    "knowledge",
    "strategy",
    "brand",
    "psychology",
    "ux",
    "ia",
    "wireframe",
    "creative-director",
    "design-language",
    "component-intelligence",
    "design-system",
    "design-orchestrator",
    "sqlalchemy[asyncio]>=2.0.30",
]

[tool.uv.sources]
core = { workspace = true }
knowledge = { workspace = true }
strategy = { workspace = true }
brand = { workspace = true }
psychology = { workspace = true }
ux = { workspace = true }
ia = { workspace = true }
wireframe = { workspace = true }
creative-director = { workspace = true }
design-language = { workspace = true }
component-intelligence = { workspace = true }
design-system = { workspace = true }
design-orchestrator = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/figma_design"]
