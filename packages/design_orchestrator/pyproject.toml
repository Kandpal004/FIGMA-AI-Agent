[project]
name = "design-orchestrator"
version = "0.1.0"
description = "The Design Orchestrator Engine — coordinates every upstream decision into a deterministic, evidence-backed Design Execution Plan (page/section order, variants, tokens, layout, responsive/animation/accessibility/performance, review gates) for a future Figma-generation phase."
requires-python = ">=3.12"
dependencies = [
    "core",
    "knowledge",
    "strategy",
    "brand",
    "psychology",
    "ux",
    "ia",
    "wireframe",
    "creative-director",
    "design-language",
    "component-intelligence",
    "design-system",
    "sqlalchemy[asyncio]>=2.0.30",
]

[tool.uv.sources]
core = { workspace = true }
knowledge = { workspace = true }
strategy = { workspace = true }
brand = { workspace = true }
psychology = { workspace = true }
ux = { workspace = true }
ia = { workspace = true }
wireframe = { workspace = true }
creative-director = { workspace = true }
design-language = { workspace = true }
component-intelligence = { workspace = true }
design-system = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/design_orchestrator"]
