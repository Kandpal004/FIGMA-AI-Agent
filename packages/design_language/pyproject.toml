[project]
name = "design-language"
version = "0.1.0"
description = "The Design Language Engine — defines the visual language (DNA, tokens, philosophies, constraints) before any UI or Figma."
requires-python = ">=3.12"
dependencies = [
    "core",
    "knowledge",
    "strategy",
    "brand",
    "psychology",
    "creative-director",
    "sqlalchemy[asyncio]>=2.0.30",
]

[tool.uv.sources]
core = { workspace = true }
knowledge = { workspace = true }
strategy = { workspace = true }
brand = { workspace = true }
psychology = { workspace = true }
creative-director = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/design_language"]
