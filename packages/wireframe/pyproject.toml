[project]
name = "wireframe"
version = "0.1.0"
description = "The Wireframe Planning Engine — turns the information architecture into a cited, structured wireframe execution plan (no UI, no Figma)."
requires-python = ">=3.12"
dependencies = [
    "core",
    "knowledge",
    "strategy",
    "brand",
    "psychology",
    "ux",
    "ia",
    "sqlalchemy[asyncio]>=2.0.30",
]

[tool.uv.sources]
core = { workspace = true }
knowledge = { workspace = true }
strategy = { workspace = true }
brand = { workspace = true }
psychology = { workspace = true }
ux = { workspace = true }
ia = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/wireframe"]
