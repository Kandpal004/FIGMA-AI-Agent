[project]
name = "psychology"
version = "0.1.0"
description = "The Customer Psychology Engine — turns brand strategy into cited, structured customer buying psychology."
requires-python = ">=3.12"
dependencies = [
    "core",
    "knowledge",
    "strategy",
    "brand",
    "sqlalchemy[asyncio]>=2.0.30",
]

[tool.uv.sources]
core = { workspace = true }
knowledge = { workspace = true }
strategy = { workspace = true }
brand = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/psychology"]
