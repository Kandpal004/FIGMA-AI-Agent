[project]
name = "director"
version = "0.1.0"
description = "The AI Director Engine — the brain controlling every agent, workflow, approval, memory and state."
requires-python = ">=3.12"
dependencies = [
    "core",
    "pydantic>=2.8.0",
    "sqlalchemy[asyncio]>=2.0.30",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/director"]
