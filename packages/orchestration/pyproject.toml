[project]
name = "orchestration"
version = "0.1.0"
description = "The Design Director orchestration core: workflow state machine, mediator, and agent registry."
requires-python = ">=3.12"
dependencies = [
    "core",
    "pydantic>=2.8.0",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orchestration"]
