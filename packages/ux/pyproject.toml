[project]
name = "ux"
version = "0.1.0"
description = "The UX Strategy Engine — turns psychology, brand, and business strategy into cited, structured UX decisions."
requires-python = ">=3.12"
dependencies = [
    "core",
    "knowledge",
    "psychology",
    "brand",
    "strategy",
    "sqlalchemy[asyncio]>=2.0.30",
]

[tool.uv.sources]
core = { workspace = true }
knowledge = { workspace = true }
psychology = { workspace = true }
brand = { workspace = true }
strategy = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ux"]
