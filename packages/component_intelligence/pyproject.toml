[project]
name = "component-intelligence"
version = "0.1.0"
description = "The Component Intelligence Engine — decides which components should exist, when, why, and when not, for world-class ecommerce composition."
requires-python = ">=3.12"
dependencies = [
    "core",
    "knowledge",
    "strategy",
    "brand",
    "psychology",
    "ux",
    "ia",
    "wireframe",
    "creative-director",
    "design-language",
    "sqlalchemy[asyncio]>=2.0.30",
]

[tool.uv.sources]
core = { workspace = true }
knowledge = { workspace = true }
strategy = { workspace = true }
brand = { workspace = true }
psychology = { workspace = true }
ux = { workspace = true }
ia = { workspace = true }
wireframe = { workspace = true }
creative-director = { workspace = true }
design-language = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/component_intelligence"]
