[project]
name = "knowledge"
version = "0.1.0"
description = "The Knowledge Engine — a curated, versioned, cited reasoning foundation for every AI agent."
requires-python = ">=3.12"
dependencies = [
    "core",
    "sqlalchemy[asyncio]>=2.0.30",
]

[tool.uv.sources]
core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/knowledge"]
