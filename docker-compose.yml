# Local development infrastructure for the Ecommerce AI Design Director.
# Brings up the three stateful dependencies the platform relies on:
# PostgreSQL (audit trail + run state), Redis (queue/cache), Qdrant (vector
# memory). The API and web apps run on the host during development; only the
# infrastructure is containerized here.
#
#   make up      # start everything, wait for health
#   make down    # stop and remove
#   make logs    # tail logs

name: ddirector

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ddirector
      POSTGRES_PASSWORD: ddirector
      POSTGRES_DB: ddirector
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddirector -d ddirector"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
